[build]
builder = "NIXPACKS"
buildCommand = "npm ci && npm run build"

[deploy]
# `medusa start` binds every interface and honours $PORT, which Railway sets.
# -H 0.0.0.0 is explicit so the binding can't regress behind a HOST env var.
startCommand = "cd .medusa/server && npm run start -- -H 0.0.0.0"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
numReplicas = 1
