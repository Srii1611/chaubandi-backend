[build]
# Dockerfile rather than Nixpacks: the Nixpacks builder hung silently in the
# npm install phase for ~20 minutes across two separate builder instances.
# The Dockerfile pins Node, installs the native-build toolchain that some
# transitive dependencies need, and caches the dependency layer so repeat
# builds are fast.
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Start command and migrations live in the Dockerfile CMD — setting
# startCommand here would override it.
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
numReplicas = 1
